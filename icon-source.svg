<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- LaczyPrime app icon (master, 1024×1024).
       Dark iron-blue background matching the PWA theme-color, cream and
       light-blue wordmark, building cross-section watermark above. -->

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#23536f"/>
      <stop offset="100%" stop-color="#143240"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="72%">
      <stop offset="55%" stop-color="#1e4860" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0e2330" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#vignette)"/>

  <!-- Building cross-section + temperature line, upper half -->
  <g opacity="0.18">
    <g transform="translate(252, 200)">
      <rect x="0" y="0"   width="520" height="30"  fill="#f3eee2" fill-opacity="0.18"/>
      <rect x="0" y="30"  width="520" height="170" fill="#f3eee2" fill-opacity="0.10"/>
      <rect x="0" y="200" width="520" height="110" fill="#f3eee2" fill-opacity="0.22"/>
      <rect x="0" y="310" width="520" height="40"  fill="#f3eee2" fill-opacity="0.12"/>
      <rect x="0" y="0" width="520" height="350"
            fill="none" stroke="#f3eee2" stroke-opacity="0.40" stroke-width="2.5"/>
      <line x1="0" y1="30"  x2="520" y2="30"  stroke="#f3eee2" stroke-opacity="0.22" stroke-width="1.2"/>
      <line x1="0" y1="200" x2="520" y2="200" stroke="#f3eee2" stroke-opacity="0.22" stroke-width="1.2"/>
      <line x1="0" y1="310" x2="520" y2="310" stroke="#f3eee2" stroke-opacity="0.22" stroke-width="1.2"/>
    </g>
  </g>

  <!-- Temperature line, slightly stronger than the layer relief -->
  <g opacity="0.48">
    <path d="M 222 224 L 252 244 L 280 256 L 410 286 L 670 482 L 772 522 L 802 540"
          fill="none" stroke="#d05b50" stroke-width="7"
          stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="222" cy="224" r="9" fill="#d05b50"/>
    <circle cx="802" cy="540" r="9" fill="#d05b50"/>
  </g>

  <!-- Chapter rule -->
  <g transform="translate(512, 650)" opacity="0.55">
    <line x1="-130" y1="0" x2="-12" y2="0" stroke="#e8e2d2" stroke-width="3"/>
    <circle cx="0" cy="0" r="5" fill="#e8e2d2"/>
    <line x1="12" y1="0" x2="130" y2="0" stroke="#e8e2d2" stroke-width="3"/>
  </g>

  <!-- Wordmark, single-line, smaller than before -->
  <g font-family="'Iowan Old Style','Hoefler Text','Apple Garamond','Liberation Serif','DejaVu Serif',Palatino,Georgia,serif">
    <text x="498" y="822"
          font-size="128" font-weight="400"
          fill="#f3eee2" text-anchor="end" letter-spacing="-2">Laczy</text>
    <text x="514" y="822"
          font-size="128" font-weight="400" font-style="italic"
          fill="#bcd5e3" text-anchor="start" letter-spacing="-2">Prime</text>
    <!-- Brand dot omitted in the icon — the chapter rule above already
         carries the brand signature, and dropping the dot avoids font
         fallback issues across platforms. -->
  </g>
</svg>
